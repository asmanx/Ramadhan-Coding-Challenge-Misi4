<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Zikir</title>
    <link rel="stylesheet" href="css/zikir.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header-full">
        <div class="header-inner">
            <div class="header-left">
                <div class="logo"></div>
                <div class="brand">
                    <span class="ramadhan">Ramadhan</span>
                    <span class="portal">Portal</span>
                </div>
            </div>

            <div class="header-right">
                ⚙️
            </div>

        </div>
    </header>

    <!-- NAVBAR -->
    <div class="nav-container">
        <div class="navbar">

            <a href="index.html" class="nav-item">Sholat</a>
            <a href="quran.html" class="nav-item">Quran</a>
            <a href="puasa.html" class="nav-item">Puasa</a>
            <a href="zikir.html" class="nav-item active">Zikir</a>

        </div>
    </div>

    <!-- CONTAINER -->
    <div class="container">
        <div class="notification" id="notification">Target Tercapai</div>
        <h2>Zikir Counter</h2>
        <div class="subtitle">Zikir Harian</div>
        <div class="counter-display" id="counter">0</div>

        <div class="set-target">
            <div class="target">
                Target: <span id="targetDisplay">0</span>
            </div>

            <input type="number" id="targetInput" placeholder="Isi target"> <br>
            <button id="setTargetBtn">Set Target</button>
        </div>

        <div class="button-wrapper">
            <button class="btn-add" id="addBtn">+</button>
            <button class="btn-reset" id="resetBtn">R</button>
        </div>
    </div>

    <footer>
        <p>Created by Asman</p>
    </footer>

    <Script src="script/zikir.js"></Script>

</body>

</html>
