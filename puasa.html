<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Puasa</title>
    <link rel="stylesheet" href="css/puasa.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header-full">
        <div class="header-inner">
            <div class="header-left">
                <div class="logo"></div>
                <div class="brand">
                    <span class="ramadhan">Ramadhan</span>
                    <span class="portal">Portal</span>
                </div>
            </div>

            <div class="header-right">
                ⚙️
            </div>

        </div>
    </header>

    <!-- NAVBAR -->
    <div class="nav-container">
        <div class="navbar">

            <a href="index.html" class="nav-item">Sholat</a>
            <a href="quran.html" class="nav-item">Quran</a>
            <a href="puasa.html" class="nav-item active">Puasa</a>
            <a href="zikir.html" class="nav-item">Zikir</a>

        </div>
    </div>

    <!-- CONTAINER -->
    <div class="container">
        <h2>Puasa Tracker</h2>
        <div class="selected-day" id="selectedDay">Pilih tanggal Ramadhan</div>
        <div class="calendar" id="calendar"></div>

        <div class="progress">
            <div class="progress-bar" id="progressBar">
                <span id="progressText">0%</span>
            </div>
        </div>

        <div class="status" id="status">Awali Dengan Niat</div>

        <div class="options">
            <label>
                <input type="checkbox" id="fastNo">Tidak Puasa
            </label>

            <label>
                <input type="checkbox" id="fastYes">Sudah Puasa
            </label>
        </div>

        <button onclick="save()">Simpan</button>
    </div>

    <footer>
        <p>Created by Asman</p>
    </footer>

    <script src="script/puasa.js"></script>

</body>

</html>
